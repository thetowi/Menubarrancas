  <!-- 🔸 Script para animar títulos al hacer scroll -->
  <script>
    window.addEventListener("load", () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const h2 = entry.target;
          if (entry.intersectionRatio > 0.6) {
            h2.classList.add('active');
          } else {
            h2.classList.remove('active');
          }
        });
      }, { threshold: [0.4, 0.6, 0.8] });
      document.querySelectorAll('.menu-section h2').forEach(h2 => observer.observe(h2));
    });
  </script>

    // === CARGAR MENÚ DEL DÍA ===

        const data = snapshot.val();

        const totalMinutos = hora * 60 + minutos;
        const dentroDelHorario = totalMinutos >= 750 && totalMinutos <= 900;

          `;
        }

        headerHTML += `</div>`;

        contenido.className = "menu-dia-opciones";
        contenido.innerHTML = `
          <div class="columna platos">
            <h3>Platos Principales</h3>

          </div>
          <div class="columna postres">

          </div>
          <div class="columna bebidas">
            <h3>Bebidas</h3>

        section.appendChild(contenido);
        menu.parentNode.insertBefore(section, menu);

        function abrirSuave(el) {
          el.classList.add('open');
          el.style.maxHeight = el.scrollHeight + 'px';
        }
        function cerrarSuave(el) {
          el.style.maxHeight = '0px';
          el.classList.remove('open');
        }

        if (dentroDelHorario) abrirSuave(contenido);
        else cerrarSuave(contenido);

        const boton = section.querySelector("#verMenuIgualmente");
        if (boton) {
          boton.addEventListener("click", () => {

    // === CARGAR PLATOS ===
    function cargarPlatos() {
      get(child(ref(db), "entrada/platos"))
        .then((snapshot) => {
          if (!snapshot.exists()) return;
          const data = snapshot.val();
          console.log("📦 Datos cargados desde Firebase (platos):", data);
                // 🔹 Queremos que "entradas" se muestre primero
          const orden = [
            "entradas",
            "elaborados",
            "grillados-guarnicion",
            "guarnicion",
            "pastas",
            "ensaladas",
            "infantil",
            "postres"
          ];

          // Recorremos en orden predefinido si existe en Firebase
          orden.forEach((clave) => {
            if (data[clave]) {
              renderCategoria(clave, data[clave]);
            }
          });

          // Si Firebase tiene alguna categoría extra no listada, se muestran después
          Object.entries(data).forEach(([id, cat]) => {
            if (!orden.includes(id)) {
              renderCategoria(id, cat);
            }
          });
          cargarBebidas();
        });
    }

    // === CARGAR BEBIDAS ===

          if (!snapshot.exists()) return;

            "malbec",
            "cabernet",
            "chardonnay",

          orden.forEach((clave) => {

    // === RENDERIZAR SECCIONES ===
    function renderCategoria(id, data) {
      const section = document.createElement("section");
      section.className = "menu-section";
      section.id = id;

      const headerDiv = document.createElement("div");
      headerDiv.className = "section-header";
      if (id === "guarnicion") data.Categoria = "Guarnición";
      const h2 = document.createElement("h2");
      h2.textContent = data.Categoria || id;
      headerDiv.appendChild(h2);
      section.appendChild(headerDiv);

      const items = data.Platos || data.Bebidas || [];
      Object.values(items).forEach((item) => {
        const div = document.createElement("div");
        div.className = "menu-item";
        const nombre = item.Plato || item.bebida || "";
        const desc = item.Descripcion || "";
        const precio = item.Precio || item.precio;
        const base = window.location.hostname.includes("github.io")
          ? "/Menubarrancas/"
          : "";
        const imagen = item.Imagen ? `${base}${item.Imagen}` : "";

        console.log("🧩 Plato:", nombre);
        console.log("🖼️ Imagen:", imagen);
        div.className = imagen ? "menu-item con-imagen" : "menu-item";
        div.innerHTML = `
          ${imagen ? `<div class="menu-img-wrapper"><img src="${imagen}" alt="${nombre}" class="menu-img"></div>` : ""}

            <h3>${nombre}</h3>

                : ""
            }

        `;
        section.appendChild(div);
      });

      menu.appendChild(section);
    }
