<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú - Restaurante Las Barrancas</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logocho.png">
</head>
<body>
  <header>
    <h1>Barrancas</h1>
    <p>Restaurant</p>
    <img src="logobb.png" alt="Logo Las Barrancas" class="logo-header">
  </header>

  <!-- Botón hamburguesa -->
  <div class="menu-toggle" id="menuToggle">☰</div>

  <!-- Menú lateral -->
  <nav class="menu-nav" id="menuNav">
    <ul>
      <li><a href="#menu-dia" class="menu-dia-link">Menú del Día</a></li>
      <li><a href="#entradas">Entradas</a></li>
      <li><a href="#elaborados">Elaborados</a></li>
      <li><a href="#grillados-guarnicion">Grillados + Guarnición</a></li>
      <li><a href="#pastas">Pastas</a></li>
      <li><a href="#ensaladas">Ensaladas</a></li>
      <li><a href="#infantil">Infantil</a></li>
      <li><a href="#postres">Postres</a></li>
      <li><a href="#cervezas">Cervezas</a></li>
      <li><a href="#espumantes">Espumantes</a></li>
      <li><a href="#malbec">Malbec</a></li>
      <li><a href="#cabernet">Cabernet</a></li>
      <li><a href="#chardonnay">Chardonnay</a></li>
      <li><a href="#bebidassinalcohol">Bebidas sin alcohol</a></li>
    </ul>
  </nav>

  <main id="menu"></main>

  <footer>
    <p>Consultar por productos aptos celíacos</p>
    <p>© 2025 Las Barrancas</p>
  </footer>

  <!-- 🔸 Script para animar títulos al hacer scroll -->
  <script>
    window.addEventListener("load", () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const h2 = entry.target;
          if (entry.intersectionRatio > 0.6) {
            h2.classList.add('active');
          } else {
            h2.classList.remove('active');
          }
        });
      }, { threshold: [0.4, 0.6, 0.8] });
      document.querySelectorAll('.menu-section h2').forEach(h2 => observer.observe(h2));
    });
  </script>

  <!-- 🟢 Botón flotante de WhatsApp -->
  <a href="https://wa.me/541165392315?text=¡Hola!%20Quisiera%20hacer%20una%20reserva%20en%20Las%20Barrancas." 
    class="whatsapp-float" 
    target="_blank" 
    aria-label="Chat con Las Barrancas por WhatsApp">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" 
        alt="WhatsApp" 
        class="whatsapp-icon">
  </a>

  <!-- 🌍 Traductor -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'es',
        includedLanguages: 'en,pt',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- ⚙️ Script principal -->
  <script src="scripts.js" type="module"></script>
</body>
</html>
